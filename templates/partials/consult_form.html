<form class="lead-form" method="post" action="{{ url_for('create_lead') }}">
    <input type="hidden" name="utm_source" value="{{ request.args.get('utm_source', '') }}">
    <input type="hidden" name="utm_medium" value="{{ request.args.get('utm_medium', '') }}">
    <input type="hidden" name="utm_campaign" value="{{ request.args.get('utm_campaign', '') }}">
    <input type="hidden" name="landing_page" value="{{ landing_page|default('main') }}">

    <label>이름*
        <input type="text" name="name" placeholder="예: 김기사" required>
    </label>
    <label>연락처*
        <input type="text" name="phone" placeholder="예: 010-1234-5678" required>
    </label>
    <label>지역*
        <input type="text" name="region" placeholder="예: 경기 남양주" required>
    </label>
    <label>업종/용도*
        <input type="text" name="business_type" placeholder="예: 물류, 배송, 개인사업" required>
    </label>
    <label>관심 차종*
        <select name="vehicle_type" required>
            <option value="">선택해 주세요</option>
            {% for option in vehicle_options %}
            <option value="{{ option }}">{{ option }}</option>
            {% endfor %}
        </select>
    </label>
    <label>연락 가능한 시간
        <input type="text" name="contact_time" placeholder="예: 평일 오후 2시 이후">
    </label>
    <label>추가 요청사항
        <textarea name="message" rows="4" placeholder="원하시는 차량 조건이나 문의 내용을 작성해 주세요"></textarea>
    </label>
    <div class="consent-box">
        <strong>개인정보 수집·이용 및 통합 상담 안내</strong>
        <p>본 상담 신청은 (주)씨앤제이컴퍼니를 통하여 진행되며, 입력된 데이터는 상담 진행과 후속 관리 목적으로만 사용됩니다. 상담 신청 데이터는 자동 저장·관리·취급됩니다.</p>
        <p>동일한 회사 직원이 차량상담, 특장상담, 보험견적 등 통합 상담을 진행하기 위해 개인정보가 제3자에게 제공될 수 있습니다. 자세한 내용은 <a href="{{ url_for('privacy_policy') }}">개인정보처리방침</a> 및 <a href="{{ url_for('privacy_consent') }}">개인정보 수집·이용 안내</a>에서 확인해 주세요.</p>
        <label class="consent-check">
            <input type="checkbox" name="privacy_agree" value="yes" required>
            <span>내용에 동의함</span>
        </label>
    </div>
    <button type="submit" class="btn btn-primary full">상담 신청하기</button>
</form>
