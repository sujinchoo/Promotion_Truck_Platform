<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Truck Lead MVP{% endblock %}</title>
    <meta name="description" content="신뢰 중심의 화물차 상담 랜딩페이지 MVP">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ url_for('index') }}" class="brand">TruckLead</a>
            <nav>
                <a href="{{ url_for('index') }}#features">서비스</a>
                <a href="{{ url_for('index') }}#consult">상담신청</a>
                <a href="{{ url_for('admin') }}">관리자</a>
            </nav>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container flash-wrap">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
