<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Truck Lead {% endblock %}</title>
    <meta name="description" content="화물 차량 리스/운용리스 상담 페이지">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% if show_header|default(true) %}
    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ url_for('index') }}" class="brand">TruckLead</a>
            <nav>
                <a href="{{ url_for('index') }}#features">서비스</a>
                <a href="{{ url_for('index') }}#consult">상담신청</a>
                <a href="{{ url_for('mobile_landing') }}">모바일 랜딩</a>
                <a href="{{ url_for('privacy_policy') }}">개인정보처리방침</a>
                <a href="{{ url_for('admin') }}">관리자</a>
            </nav>
        </div>
    </header>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container flash-wrap">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
