services:
  - type: web
    name: truck-lead-mvp
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: truck-lead-db
          property: connectionString

databases:
  - name: truck-lead-db
    plan: free
